name: ci-cd

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    env:
      REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
      IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      K8S_DEPLOYMENT: ${{ vars.K8S_DEPLOYMENT }}
      K8S_CONTAINER: ${{ vars.K8S_CONTAINER }}
      VERIFY_URL: ${{ vars.VERIFY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Debug vars
        run: |
          echo "REGISTRY_USERNAME=$REGISTRY_USERNAME"
          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY"
          echo "K8S_NAMESPACE=$K8S_NAMESPACE"
          echo "K8S_DEPLOYMENT=$K8S_DEPLOYMENT"
          echo "K8S_CONTAINER=$K8S_CONTAINER"
          echo "VERIFY_URL=$VERIFY_URL"
          echo "IMAGE_TAG=$IMAGE_TAG"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build image
        run: docker build -t "$IMAGE_REPOSITORY:$IMAGE_TAG" .

      - name: Push image
        run: docker push "$IMAGE_REPOSITORY:$IMAGE_TAG"

      - name: Verify kubectl
        run: |
          whoami
          echo "$HOME"
          ls -l /home/f1sh/.kube/config
          kubectl --kubeconfig=/home/f1sh/.kube/config config current-context
          kubectl --kubeconfig=/home/f1sh/.kube/config cluster-info

      - name: Deploy to Kubernetes
        run: |
          kubectl --kubeconfig=/home/f1sh/.kube/config -n "$K8S_NAMESPACE" \
            set image deployment/"$K8S_DEPLOYMENT" \
            "$K8S_CONTAINER"="$IMAGE_REPOSITORY:$IMAGE_TAG"

          kubectl --kubeconfig=/home/f1sh/.kube/config -n "$K8S_NAMESPACE" \
            rollout status deployment/"$K8S_DEPLOYMENT" --timeout=300s

          kubectl --kubeconfig=/home/f1sh/.kube/config -n "$K8S_NAMESPACE" \
            rollout history deployment/"$K8S_DEPLOYMENT"

      - name: Verify service
        run: curl -f -H "Host: $VERIFY_HOST" "$VERIFY_URL"
